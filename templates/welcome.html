  </h1>

  {%block script%}
  <script src="{%static 'js/utils.js'%}"></script>
  <script>
    $(document).ready(function() {
      setTimeout(function(){
      $('.logo-container').show()
      $('svg path').addClass('visible')
      setTimeout(function(){
        $('.white').removeClass('white').addClass('black');
        $('.center-white').removeClass('center-white').addClass('center-black');
        $('.line-white').removeClass('line-white').addClass('line-black');
        $('.black').removeClass('black').addClass('white');
        $('.line-black').removeClass('line-black').addClass('line-white');
        setTimeout(function(){
          $('svg').addClass('finalposition')
          setTimeout(function(){
            $('.logo-container').addClass('final-position')
            setTimeout(function(){
              $('.logo-name').addClass('reveal')
            },1500)
          },1500)
        },1000)
      },2000)
    },7000)
    });
  </script>
  {%endblock%}
  {%block style%}
  <link rel="stylesheet" href="{%static 'css/landing.css'%}">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');
    
    .logo-name{
      font-family: "Quicksand"!important;
      font-size: 5.5em!important;
      color: rgb(27 28 29);
      position: absolute;
      top:38.5%;
      left: 42%;
      opacity: 0;
    }
    .logo-name.reveal{
      animation: textanimation ease 1.5s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }
    svg path.visible{
      opacity: 0;
      animation: logo ease 0.5s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }
    .line-white{
      stroke: white
    }
    .white, .center-white {
      fill:white
    }
    .line-black{
      stroke: rgb(27 28 29)
    }
    .black, .center-black {
      fill: rgb(27 28 29)
    }
    svg.finalposition{
      animation: logoreduce cubic-bezier(0.32, 0.57, 0.59, 1.01) 1.5s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }
  
    .logo-container{
      display: none;
      position: absolute;
      top: 20%;
      left:35%
    }
  
    .logo-container.final-position{
      animation: logofinalposition ease 1.5s;
      animation-iteration-count: 1;
      animation-fill-mode: forwards;
    }
  
    #circle-bg.visible{
      animation-delay: 2.05s;
    }
    #line-1.visible {
      animation-delay: 0.55s;
    }
    #point-2.visible {
      animation-delay: 0.55s;
    }
    #line-2.visible {
      animation-delay: 1.05s;
    }
    #point-3.visible {
      animation-delay: 1.05s;
    }
    #line-3.visible {
      animation-delay: 1.55s;
    }
    #point-4.visible {
      animation-delay: 1.55s;
    }
  
    @keyframes textanimation{
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
    @keyframes logofinalposition{
      0%{
        left:35%
      }
      100%{
        left:23%
      }
    }
    @keyframes logoreduce {
      0% {
        transform: scale(1);
      }
      100% {
        transform: scale(0.5);
      }
    }
    @keyframes logo {
      0% {
        opacity: 0;
      }
      100% {
        opacity: 1;
      }
    }
  </style>
  {%endblock%}
