  </div>

<link rel="stylesheet" href="https://cdn3.devexpress.com/jslib/23.1.4/css/dx.light.css"> 
<!-- DevExtreme library -->
<script type="text/javascript" src="https://cdn3.devexpress.com/jslib/23.1.4/js/dx.all.js"></script>
<script src="https://unpkg.com/devextreme-aspnet-data@2.9.2/js/dx.aspnet.data.js"></script>
<script>
  var date_form = '{{from}}'
  var date_to = '{{to}}'
</script>
<script>

  $(document).ready(function(){
    /* var derivers = $.pivotUtilities.derivers;
    var dateFormat = $.pivotUtilities.derivers.dateFormat;
    var renderers = $.extend($.pivotUtilities.renderers,
        $.pivotUtilities.plotly_renderers);

    var expenses_json = $.getJSON('/reports/expenses/?todo=pivot&date_from=2023-01-01&date_to=2023-03-31',function(data){
      $("#output").pivotUI(data.data,{
        vals:['importe','importe_usd'],
        renderers: renderers,
        derivedAttributes: {
            "month": dateFormat("fecha", "%n", true),
            "year":   dateFormat("fecha", "%y", true)
        },
      },false,'es')
    }) */
    var url = `/reports/expenses/?todo=pivot&date_from=${date_form}&date_to=${date_to}`
    var expenses_json = $.getJSON(url,function(data){
      let drillDownDataSource = {};
      const salesPopup = $('#drill-popup').dxPopup({
        width: 900,
        height: 600,
        contentTemplate(contentElement) {
          $('<div />')
            .addClass('drill-down')
            .dxDataGrid({
              width: 860,
              height: 500,
              columns: ['fecha','cuenta__pk', 'nit_tercero',
                        'nombre_tercero','ceco__cedo','texto',
                      'clasificacion__pk','importe'],
            })
            .appendTo(contentElement);
        },
        onShowing() {
          $('.drill-down')
            .dxDataGrid('instance')
            .option('dataSource', drillDownDataSource);
        },
        onShown() {
          $('.drill-down')
            .dxDataGrid('instance')
            .updateDimensions();
        },
      }).dxPopup('instance');
  
      $("#dataGridContainer").dxPivotGrid({
        dataSource: {
            store: data.data,
            fields: [{
              caption: 'Responsable',
              dataField: 'clasificacion__responsable',
              area: "row"
            },{
              caption: 'Cuenta',
              dataField: 'cuenta__pk',
              area: "row",
              width:250,
              selector(data) {
                return `${data.cuenta__pk} (${data.cuenta__nombre_cuenta})`;
              },
            },{
              caption: 'CeBe/Orden',
              dataField: 'ceco__pk',
            },{
              caption: 'Centro de costo',
              dataField: 'ceco__cedo',
            },{
              caption: 'Clasificación',
              dataField: 'clasificacion__pk',
            },{
              dataField: 'fecha',
              dataType: 'date',
            },{
              dataField: 'importe',
              area:'data',
              summaryType: 'sum',
              format: "currency"
            }, {
              dataField: 'pk',
              visible: false,
            }, {
              dataField: 'cuenta__nombre_cuenta',
              visible: false,
            }
        ]
        },
        allowSortingBySummary: true,
        allowSorting: true,
        allowFiltering: true,
        allowExpandAll: true,
        height: 700,
        scrolling: {
          mode: 'virtual',
        },
        fieldPanel: {
              visible: true,
              showFilterFields: true,
        },
        fieldChooser: {
          allowSearch: true
        },
        headerFilter: {
          search: {
            enabled: true,
          },
          showRelevantValues: true,
          width: 300,
          height: 400,
        },
        stateStoring: {
          enabled: true,
          type: 'localStorage',
          storageKey: 'dx-widget-gallery-pivotgrid-storing',
        },
        onCellClick(e) {
          if (e.area === 'data') {
            const pivotGridDataSource = e.component.getDataSource();
            const rowPathLength = e.cell.rowPath.length;
            const rowPathName = e.cell.rowPath[rowPathLength - 1];
            const popupTitle = `${rowPathName || 'Total'} Detalle`;

            drillDownDataSource = pivotGridDataSource.createDrillDownDataSource(e.cell);
            salesPopup.option('title', popupTitle);
            salesPopup.show();
          }
        },
    });

    
  })
  })
</script>
{%endblock%}
