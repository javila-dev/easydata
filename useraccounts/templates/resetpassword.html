{%load static%}<!DOCTYPE html>
<html lang="es" >
<head>
  <meta charset="UTF-8">
  <title>Easy data - Atlantic</title>
  <link rel="icon" type="image/jpg" href="{%static 'img/just_logo_circle.png'%}"/>
  <link rel="stylesheet" href="{%static 'css/login.css'%}">
</head>
<body>
    <div class="container" id="container">
        <div class="form-container sign-up">
        </div>
        <div class="form-container sign-in">
            <form method="post" id="form-change-pwd">{%csrf_token%}
                <h2 style="margin-bottom: 2rem;text-align: center;">Cambiar contraseña</h2>
                <input type="text" hidden name="token" value="{{token|safe}}">
                <input type="text" hidden name="todo" value="resetpassword">
                <input type="password" placeholder="Nueva contraseña" id="pwd1" required name="new_password">
                <input type="password" placeholder="Repetir contraseña" id="pwd2" required name="repeat_new_password">
                <p style="color: lightcoral;" id="change-result"></p>
                <button type="submit" id="login">Cambiar</button>
            </form>
        </div>
        <div class="toggle-container">
            <div class="toggle">
                <div class="toggle-panel toggle-left">
                </div>
                <div class="toggle-panel toggle-right">
                    <img width="80%" style="margin-bottom:2.5rem;" src="{%static 'img/logo_blanco.png'%}">
                    <h2>Recuerda que debes usar por lo menos</h2><br>
                    <ul style="text-align:left!important">
                        <li>Mínimo 6 caracteres</li>
                        <li>Una letra mayúscula</li>
                        <li>Una letra minúscula</li>
                        <li>Un número</li>
                        <li>Un símbolo (excepto &,=,?)</li>
                    </ul>
                    
                    <img width="30%" style="margin-top:3rem;" src="https://info.atlantic.la/wp-content/uploads/2016/06/atlantic.png">
                </div>
            </div>
        </div>
    </div>
    
    <script src="{%static 'js/utils.js'%}"></script>
    <!-- <script src="{%static 'js/login.js'%}"></script> -->
     <script>
        const changepwd = document.getElementById('form-change-pwd');
        const loginBtn = document.getElementById('login');
        changepwd.addEventListener('submit', (event) => {
            pwd1 = document.getElementById('pwd1').value
            pwd2 = document.getElementById('pwd2').value
            result = document.getElementById('change-result')

            if (pwd1 != pwd2) {
                result.innerText = 'Las contraseñas no coinciden';
                event.preventDefault();
                return false;
            }
            if (!validatePassword(pwd1)){
                result.innerText = 'La contraseña debe tener al menos 6 caracteres, incluir al menos una letra mayúscula, una letra minúscula, un número y un símbolo'
                event.preventDefault();
                return false;
            }
            result.innerText = ''
            loginBtn.innerText = ''
            loginBtn.classList.add("loader");
            })
     </script>
</body>
</html>
